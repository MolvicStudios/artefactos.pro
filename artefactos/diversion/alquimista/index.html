<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Alquimista — Gabinete de Curiosidades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="alquimista.css">
  <script type="module" src="alquimista.js"></script>
</head>
<body class="alquimista-page">

  <!-- Header -->
  <header class="gabinete-header">
    <a id="back-btn" href="../../../index.html" class="back-btn">← Volver al Gabinete</a>
    <button id="lang-toggle" class="lang-toggle" aria-label="Cambiar idioma">EN</button>
  </header>

  <!-- API Key Panel -->
  <div id="key-panel"></div>

  <!-- Layout principal -->
  <div class="alquimista-layout">

    <!-- Columna principal -->
    <main class="alquimista-main">
      <!-- Título -->
      <h1 id="alquimista-title" class="alquimista-title">El Alquimista</h1>
      <p class="alquimista-subtitle">Solve et Coagula — Disuelve y Reúne</p>

      <!-- Chat -->
      <div id="alquimista-chat" class="alquimista-chat"></div>

      <!-- Loader -->
      <div id="alquimista-loader" class="alquimista-loader">
        <span>☿ Consultando los textos herméticos...</span>
      </div>

      <!-- Error -->
      <div id="alquimista-error" class="alquimista-error"></div>

      <!-- Input -->
      <div class="alquimista-input-bar">
        <input id="alquimista-input" class="alquimista-input" type="text" placeholder="Pregunta al Alquimista..." autocomplete="off">
        <button id="btn-send" class="alquimista-send">Preguntar</button>
      </div>
    </main>

    <!-- Grimorio lateral -->
    <aside class="alquimista-grimoire">
      <button id="grimoire-toggle" class="alquimista-grimoire__toggle">📜 Grimorio</button>
      <div id="grimoire-content" class="alquimista-grimoire__content">
        <h2 id="grimoire-title" class="alquimista-grimoire__title">Grimorio</h2>
        <div id="grimoire-list"></div>
      </div>
    </aside>

  </div>

  <!-- Footer -->
  <footer class="gabinete-footer">
    <p>© MolvicStudios.pro — Gabinete de Curiosidades</p>
  </footer>

  <script src="/js/cookie-banner.js" defer></script>
</body>
</html>
