<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duelo de Filósofos — Gabinete de Curiosidades</title>
  <link rel="stylesheet" href="../../styles/gabinete.css">
  <link rel="stylesheet" href="duelo.css">
  <script src="../../js/config.js" defer></script>
  <script type="module" src="duelo.js" defer></script>
</head>
<body class="duelo-page">

  <!-- Header -->
  <header class="gabinete-header">
    <a id="back-btn" href="../../index.html" class="back-btn">← Volver al Gabinete</a>
    <button id="lang-toggle" class="lang-toggle" aria-label="Cambiar idioma">EN</button>
  </header>

  <!-- Contenido -->
  <main class="duelo-container">

    <!-- Título -->
    <h1 id="duelo-title" class="duelo-title">Duelo de Filósofos</h1>
    <p class="duelo-subtitle">Elige dos mentes. Elige un tema. Observa cómo chocan.</p>

    <!-- Panel de configuración -->
    <div id="duelo-setup" class="duelo-setup">
      <div class="duelo-setup__row">
        <div class="duelo-setup__group">
          <label id="label-a" class="duelo-setup__label" for="select-a">Filósofo A</label>
          <select id="select-a" class="duelo-setup__select"></select>
        </div>
        <span class="duelo-setup__vs">VS</span>
        <div class="duelo-setup__group">
          <label id="label-b" class="duelo-setup__label" for="select-b">Filósofo B</label>
          <select id="select-b" class="duelo-setup__select"></select>
        </div>
      </div>

      <label id="label-topic" class="duelo-setup__label" for="topic-input">Tema del debate</label>
      <input id="topic-input" class="duelo-setup__topic" type="text" placeholder="Ej: ¿Existe el libre albedrío?" autocomplete="off">

      <button id="btn-start" class="duelo-btn-start">¡Que comience el duelo!</button>
    </div>

    <!-- Arena de debate -->
    <div id="duelo-arena" class="duelo-arena">

      <!-- Cabecera de ronda -->
      <div class="duelo-round-header">
        <div id="round-label" class="duelo-round-header__text">Ronda 1 de 3</div>
        <div id="arena-topic" class="duelo-round-header__topic"></div>
      </div>

      <!-- Columnas enfrentadas -->
      <div class="duelo-columns">
        <div id="column-a" class="duelo-column duelo-column--a">
          <div id="portrait-a" class="duelo-portrait"></div>
          <div id="name-a" class="duelo-column__name"></div>
          <div id="speech-a" class="duelo-column__speech"></div>
        </div>
        <div id="column-b" class="duelo-column duelo-column--b">
          <div id="portrait-b" class="duelo-portrait"></div>
          <div id="name-b" class="duelo-column__name"></div>
          <div id="speech-b" class="duelo-column__speech"></div>
        </div>
      </div>

      <!-- Historial de rondas -->
      <div id="debate-rounds"></div>

      <!-- Loader -->
      <div id="duelo-loader" class="duelo-loader">
        <span>⚡ Preparando argumentos...</span>
      </div>

      <!-- Error -->
      <div id="duelo-error" class="duelo-error"></div>

      <!-- Acciones -->
      <div class="duelo-actions">
        <button id="btn-next" class="duelo-btn-next">Siguiente ronda</button>
        <button id="btn-verdict" class="duelo-btn-verdict">Veredicto del árbitro</button>
        <button id="btn-new" class="duelo-btn-new">Nuevo duelo</button>
      </div>

      <!-- Veredicto -->
      <div id="duelo-verdict" class="duelo-verdict">
        <div class="duelo-verdict__title">⚖ VEREDICTO</div>
        <p id="verdict-text" class="duelo-verdict__text"></p>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="gabinete-footer">
    <p>© MolvicStudios.pro — Gabinete de Curiosidades</p>
  </footer>

</body>
</html>
