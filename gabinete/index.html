<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabinete de Curiosidades — MolvicStudios</title>
  <meta name="description" content="Gabinete de Curiosidades Interactivas — Experiencias de IA por MolvicStudios">
  <link rel="stylesheet" href="styles/gabinete.css">
  <script type="module" src="js/main.js" defer></script>
  <style>
    /* === ESTILOS ESPECÍFICOS DE LA GALERÍA === */
    .gallery-hero {
      text-align: center;
      padding: 60px 24px 20px;
    }

    .gallery-hero__title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--accent-gold);
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .gallery-hero__subtitle {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    /* Grid de artefactos */
    .artefactos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      padding: 40px 32px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Tarjeta de artefacto */
    .artefacto-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 36px 28px 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all var(--transition-normal);
      position: relative;
      overflow: hidden;
    }

    .artefacto-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      opacity: 0;
      transition: opacity var(--transition-normal);
      box-shadow: 0 0 40px var(--card-color, #c9a84c);
      pointer-events: none;
    }

    .artefacto-card:hover {
      transform: translateY(-6px);
      border-color: var(--card-color, rgba(255, 255, 255, 0.15));
    }

    .artefacto-card:hover::before {
      opacity: 0.12;
    }

    .artefacto-card__icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }

    .artefacto-card__icon svg {
      width: 100%;
      height: 100%;
    }

    .artefacto-card__name {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.1rem;
      color: var(--card-color, var(--accent-gold));
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    .artefacto-card__desc {
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .artefacto-card__enter {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--card-color, var(--accent-gold));
      border: 1px solid var(--card-color, var(--accent-gold));
      padding: 8px 24px;
      border-radius: 3px;
      transition: all var(--transition-fast);
    }

    .artefacto-card:hover .artefacto-card__enter {
      background: var(--card-color, var(--accent-gold));
      color: var(--bg-dark);
    }

    /* Badge NUEVO */
    .artefacto-card__badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #c9a84c, #f0d878);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* Mapa de Ideas — tarjeta con fondo claro */
    .artefacto-card[style*="#003153"] .artefacto-card__name { color: #003153; }
    .artefacto-card[style*="#003153"] .artefacto-card__desc { color: #333; }
    .artefacto-card[style*="#003153"] .artefacto-card__enter { color: #003153; border-color: #003153; }
    .artefacto-card[style*="#003153"]:hover .artefacto-card__enter { background: #003153; color: #fafaf5; }
    .artefacto-card[style*="#003153"] .artefacto-card__badge { background: #003153; color: #fafaf5; }

    /* Responsive */
    @media (max-width: 600px) {
      .artefactos-grid {
        grid-template-columns: 1fr;
        padding: 24px 16px 40px;
      }

      .gallery-hero {
        padding: 40px 16px 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="gabinete-header">
    <div class="gabinete-header__title">
      <a href="/gabinete/">GABINETE · CABINET</a>
    </div>
    <button id="lang-toggle" class="lang-toggle" aria-label="Cambiar idioma">EN</button>
  </header>

  <!-- Hero -->
  <section class="gallery-hero">
    <h1 id="gallery-title" class="gallery-hero__title">Gabinete de Curiosidades</h1>
    <p id="gallery-subtitle" class="gallery-hero__subtitle">Una colección de mentes artificiales por MolvicStudios</p>
  </section>

  <!-- Grid de artefactos -->
  <main id="artefactos-grid" class="artefactos-grid">
    <!-- Las tarjetas se renderizan dinámicamente desde main.js -->
  </main>

  <!-- Footer -->
  <footer class="gabinete-footer">
    <p id="gallery-footer">© MolvicStudios.pro — Experiencias construidas con Groq + LLaMA 3.3</p>
  </footer>

</body>
</html>
